            await this.delay();
            const user = this.users.find(u => u.email === identifier || u.username === identifier);

            await this.delay();

          async createClass(teacherId, name) { await this.delay(); const nc = { id: `c${Date.now()}`, teacherId, name, studentIds: [] }; this.classes.push(nc); return nc; }
          async deleteClass(classId) { await this.delay(); this.classes = this.classes.filter(c => c.id !== classId); }
          async getAllStudents() { await this.delay(); return this.users.filter(u => u.role === 'student'); }
          async addStudentToClass(classId, studentId) { await this.delay(); const cls = this.classes.find(c => c.id === classId); if (cls && !cls.studentIds.includes(studentId)) cls.studentIds.push(studentId); return cls; }
          async removeStudentFromClass(classId, studentId) { await this.delay(); const cls = this.classes.find(c => c.id === classId); if (cls) cls.studentIds = cls.studentIds.filter(id => id !== studentId); }
          async getClassAssignments(classId) { await this.delay(); return this.assignments.filter(a => a.classId === classId).map(a => ({ ...a, submissionCount: this.submissions.filter(s => s.assignmentId === a.id).length })); }
          async createAssignment(classId, title, description, dueDate, type, typeData) { await this.delay(); const na = { id: `a${Date.now()}`, classId, title, description, dueDate, type, typeData, createdAt: new Date().toISOString() }; this.assignments.push(na); return na; }
          async getStudentAssignments(studentId) {
            await this.delay();
            const sClasses = this.classes.filter(c => c.studentIds.includes(studentId));
            const cIds = sClasses.map(c => c.id);
            return this.assignments.filter(a => cIds.includes(a.classId)).map(a => {
              const cls = sClasses.find(c => c.id === a.classId);
              const sub = this.submissions.find(s => s.assignmentId === a.id && s.studentId === studentId);
              return { ...a, className: cls ? cls.name : '', status: sub ? 'completed' : 'pending', score: sub?.score, total: sub?.total, feedback: sub?.feedback, typeData: a.typeData };
            });
          }
          async submitAssignment(assignmentId, studentId, score, total, feedback = '', details = null) { await this.delay(); this.submissions.push({ assignmentId, studentId, score, total, feedback, details, completedAt: new Date().toISOString() }); }
          async getAssignmentResults(assignmentId) {
            await this.delay();
            const a = this.assignments.find(x => x.id === assignmentId); if (!a) return [];
            const cls = this.classes.find(c => c.id === a.classId); if(!cls) return [];
            return cls.studentIds.map(sid => {
                const student = this.users.find(u => u.id === sid);
                const sub = this.submissions.find(s => s.assignmentId === assignmentId && s.studentId === sid);

            });
          }

        function safeJsonParse(raw) {
          if (!raw) return null; if (typeof raw !== 'string') return raw;
          try {
            let clean = raw.trim(); const bt = String.fromCharCode(96, 96, 96);
            if (clean.startsWith(bt)) { clean = clean.replace(new RegExp('^' + bt + '(?:json|javascript)?\\n?', 'i'), '').replace(new RegExp(bt + '\\n?$', 'i'), '').trim(); }
            return JSON.parse(clean.replace(/,\s*([\}\]])/g, '$1'));
          } catch (e) { 
            try { 
              const startObj = raw.indexOf('{'); const endObj = raw.lastIndexOf('}');
              const startArr = raw.indexOf('['); const endArr = raw.lastIndexOf(']');
              let start = -1, end = -1;
              if (startObj !== -1 && (startArr === -1 || startObj < startArr)) { start = startObj; end = endObj; } 
              else if (startArr !== -1) { start = startArr; end = endArr; }
              if (start !== -1 && end !== -1 && start < end) { return JSON.parse(raw.substring(start, end + 1).replace(/,\s*([\}\]])/g, '$1')); }
            } catch (err) {} 
            return null; 
          }
        }

                  <nav className="flex-1 space-y-2">
                    <button onClick={() => setTab('home')} className={clsx("w-full text-left p-4 rounded-xl font-bold", tab === 'home' ? "bg-white/10 text-white" : "text-slate-500 hover:bg-white/5")}>Anasayfa</button>
                    <button onClick={() => setTab('ai-asistan')} className={clsx("w-full text-left p-4 rounded-xl font-bold", tab === 'ai-asistan' ? "bg-white/10 text-white" : "text-slate-500 hover:bg-white/5")}>Ai Asistan</button>
                  </nav>
                  <button onClick={logout} className="p-4 text-rose-400 font-bold hover:bg-rose-500/10 rounded-xl flex items-center gap-3"><LogOut size={20}/> Çıkış</button>
               </aside>
               <main className="flex-1 bg-[#f8fafc] text-slate-900 md:rounded-tl-[3rem] p-10 overflow-y-auto">
                  {tab === "home" && <PortalHome />}
                  {tab === "ai-asistan" && <AIAssistant />}
               </main>
               <FloatingAssistant />
            </div>
          );
        }

        function AppContent() {
          const { user } = useAuth();
          if (!user) return <LoginScreen />;
          return (<WiseAiEgitimPlatformu />);
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
          <ErrorBoundary>
            <GeminiProvider>
              <AuthProvider>
                <AppContent />
              </AuthProvider>
            </GeminiProvider>
          </ErrorBoundary>
        );
    </script>
</body>
</html>
